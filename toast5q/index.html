<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>⚡ 빠른 그림 세탁소</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    :root {
      --bg-color: #f8f9fa; --text-color: #212529; --border-color: #dee2e6;
      --section-bg: #ffffff; --btn-bg: #e9ecef; --btn-hover-bg: #dee2e6;
      --accent-btn-bg: #228be6; --accent-btn-hover-bg: #1c7ed6;
      --key-color: #868e96;
    }
    body.dark {
      --bg-color: #121212; --text-color: #e9ecef; --border-color: #343a40;
      --section-bg: #1e1e1e; --btn-bg: #343a40; --btn-hover-bg: #495057;
      --key-color: #adb5bd;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-color);
      min-height: 100dvh;
      display: flex; flex-direction: column;
    }

    /* ── 헤더 (고정, 세이프에리어 반영) ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: var(--section-bg);
      border-bottom: 1px solid var(--border-color);
    }
    .header h1 {
      font-size: 1.05rem; margin: 0; white-space: nowrap;
    }
    .header h1 .quick-badge {
      font-size: 0.72rem; font-weight: 800; vertical-align: middle;
      background: var(--accent-btn-bg); color: #fff;
      padding: 2px 7px; border-radius: 999px;
    }
    .header-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .header-btns button {
      background: var(--btn-bg); color: var(--text-color);
      border: none; padding: 8px 10px; border-radius: 8px;
      font-size: 1rem; cursor: pointer; transition: background-color 0.2s;
    }
    .header-btns button:hover { background: var(--btn-hover-bg); }

    /* ── 메인 영역 ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      max-width: 600px; width: 100%;
      margin: 0 auto;
    }

    /* ── 업로드 박스: 모바일에서 남은 공간 전부 차지 ── */
    .upload-box {
      flex: 1;
      min-height: 220px;
      border: 2.5px dashed var(--border-color);
      border-radius: 14px;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; text-align: center;
      padding: 24px;
      -webkit-user-select: none; user-select: none;
    }
    .upload-box:hover, .upload-box.dragover { background-color: var(--bg-color); border-color: var(--accent-btn-bg); }
    .upload-box .big { font-size: 3rem; line-height: 1; }
    .upload-box .label { font-size: 1rem; font-weight: 600; }
    .upload-box .hint { color: var(--key-color); font-size: 0.82rem; }
    .upload-box.busy { pointer-events: none; }
    .upload-box.busy .big { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #file-input { display: none; }

    /* ── 설정 요약 ── */
    .wm-summary {
      margin-top: 14px;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
    }
    .wm-summary .summary-text {
      text-align: center;
      color: var(--key-color); font-size: 0.78rem; line-height: 1.5;
    }
    .wm-summary .summary-text b { color: var(--text-color); }
    .wm-summary .full-link-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--btn-bg);
      color: var(--key-color);
      font-size: 0.76rem; font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--border-color);
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
    }
    .wm-summary .full-link-chip:hover {
      background: var(--accent-btn-bg);
      color: #fff;
      border-color: var(--accent-btn-bg);
    }
    .wm-summary .full-link-chip .arrow {
      font-size: 0.7rem; transition: transform 0.15s;
    }
    .wm-summary .full-link-chip:hover .arrow { transform: translateX(2px); }

    /* ── 토스트 알림 ── */
    .toast {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: var(--section-bg);
      border-top: 1px solid var(--border-color);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 200;
    }
    .toast.show { transform: translateY(0); }
    body.dark .toast { box-shadow: 0 -4px 20px rgba(0,0,0,0.4); }

    .toast-inner { max-width: 600px; margin: 0 auto; }
    .toast-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .toast-head .done { font-weight: 700; font-size: 0.95rem; }
    .toast-head .done .num { color: var(--accent-btn-bg); }
    .toast-head .close-btn {
      background: none; border: none; font-size: 1.2rem;
      color: var(--key-color); cursor: pointer; padding: 4px 8px;
    }

    .toast-preview {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-color); border-radius: 10px; padding: 10px;
    }
    .toast-preview img {
      width: 56px; height: 56px; object-fit: cover;
      border-radius: 6px; flex-shrink: 0;
    }
    .toast-preview .info {
      flex: 1; min-width: 0;
      font-size: 0.8rem; color: var(--key-color);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .toast-actions { display: flex; gap: 8px; margin-top: 10px; }
    .toast-actions button {
      flex: 1; border: none; padding: 14px; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .toast-actions .primary { background: var(--accent-btn-bg); color: #fff; }
    .toast-actions .primary:active { background: var(--accent-btn-hover-bg); }
    .toast-actions .secondary { background: var(--btn-bg); color: var(--text-color); }
    .toast-actions .secondary:active { background: var(--btn-hover-bg); }

    #multi-save-list { display: none; flex-direction: column; gap: 6px; margin-top: 4px; }
    #multi-save-list.show { display: flex; }
    .multi-save-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-color); border-radius: 8px; padding: 8px 10px;
    }
    .multi-save-row img {
      width: 38px; height: 38px; object-fit: cover; border-radius: 5px; flex-shrink: 0;
    }
    .multi-save-row .name {
      flex: 1; min-width: 0; font-size: 0.78rem; color: var(--key-color);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .multi-save-row button {
      flex-shrink: 0; border: none; padding: 7px 12px; border-radius: 7px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      background: var(--accent-btn-bg); color: #fff;
    }
    .multi-save-row button:active { background: var(--accent-btn-hover-bg); }
    .multi-save-row.saved button {
      background: var(--btn-bg); color: var(--key-color);
    }
    .multi-save-hint {
      text-align: center; font-size: 0.76rem; color: var(--key-color);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div class="header">
    <h1>⚡ <span class="quick-badge">빠른</span> 그림 세탁소</h1>
    <div class="header-btns">
      <button id="home-link" title="세탁소 모음">🫧</button>
      <button id="delicate-link" title="섬세 그림 세탁소">🎬</button>
      <button id="full-link" title="오리지널 세탁소">🧼</button>
    </div>
  </div>

  <!-- 메인 -->
  <div class="main">
    <div id="upload-box" class="upload-box">
      <span class="big">🧺</span>
      <span class="label" id="upload-text">그림을 넣으면 즉시 세탁</span>
      <span class="hint">클릭 또는 드래그 · 여러 장 OK</span>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple>
    <div class="wm-summary" id="wm-summary"></div>
  </div>

  <!-- 하단 토스트 (결과) -->
  <div class="toast" id="toast">
    <div class="toast-inner">
      <div class="toast-head">
        <span class="done">✅ <span class="num" id="total-count">0</span>장 세탁 완료</span>
        <button class="close-btn" id="toast-close" title="닫기">✕</button>
      </div>
      <div class="toast-preview" id="single-preview">
        <img id="preview-img" alt="미리보기">
        <span class="info" id="preview-name"></span>
      </div>
      <div id="multi-save-list"></div>
      <div class="toast-actions">
        <button class="primary" id="another-btn">🖼️ 다른 그림 세탁</button>
        <button class="secondary" id="resave-btn" title="자동 다운로드가 막혔을 때">💾 다시 저장</button>
      </div>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const uploadBox = document.getElementById('upload-box');
  const uploadText = document.getElementById('upload-text');
  const fileInput = document.getElementById('file-input');
  const wmSummary = document.getElementById('wm-summary');
  const toast = document.getElementById('toast');
  const totalCountEl = document.getElementById('total-count');
  const previewImg = document.getElementById('preview-img');
  const previewName = document.getElementById('preview-name');
  const singlePreview = document.getElementById('single-preview');
  const multiSaveList = document.getElementById('multi-save-list');
  const anotherBtn = document.getElementById('another-btn');
  const resaveBtn = document.getElementById('resave-btn');
  const toastClose = document.getElementById('toast-close');
  const homeLinkBtn = document.getElementById('home-link');
  const delicateLinkBtn = document.getElementById('delicate-link');
  const fullLinkBtn = document.getElementById('full-link');

  // ── 퀵버전 기본값: "리달", 좌측 상단 ──
  const QUICK_DEFAULTS = { text: '리달', position: 'top-left', size: 30, opacity: 30, spacing: 150 };
  let settings = { ...QUICK_DEFAULTS };

  let totalCount = 0;
  let lastBlobUrl = null;
  let lastFileName = null;

  // localStorage 에 저장된 설정이 있으면 불러오되,
  // 퀵버전 전용 키(cleaner_quick_settings) 우선, 없으면 오리지날 키 참조
  function loadSettings() {
    let saved = localStorage.getItem('cleaner_quick_settings');
    if (!saved) saved = localStorage.getItem('cleaner_settings');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed && typeof parsed === 'object') settings = { ...QUICK_DEFAULTS, ...parsed };
      } catch (e) { /* 파싱 실패 시 기본값 유지 */ }
    }
    // 퀵버전은 항상 자기 기본값 강제 (문구·위치 고정)
    settings.text = QUICK_DEFAULTS.text;
    settings.position = QUICK_DEFAULTS.position;
  }

  const POSITION_LABEL = {
    'pattern': '패턴', 'center': '중앙', 'top-left': '↖ 좌측 상단', 'top': '상단',
    'top-right': '우측 상단', 'left': '좌측', 'right': '우측',
    'bottom-left': '좌측 하단', 'bottom-right': '우측 하단'
  };

  function renderSummary() {
    wmSummary.innerHTML =
      `<div class="summary-text">적용 설정 · <b>"${escapeHtml(settings.text)}"</b> · <b>${POSITION_LABEL[settings.position]}</b>` +
      ` · 크기 <b>${settings.size}</b> · 투명도 <b>${settings.opacity}%</b></div>` +
      `<a href="#" id="go-full" class="full-link-chip">정밀 버전에서 직접 설정 <span class="arrow">→</span></a>`;
    document.getElementById('go-full')?.addEventListener('click', e => {
      e.preventDefault();
      window.location.href = "https://toastout.github.io/toast5/";
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ── 워터마크: 이미지 크기에 비례하는 동적 사이즈 ──
  function drawWatermark(ctx, width, height) {
    if (!settings.text) return;

    // 기준: 1024px 기준으로 settings.size px → 실제 이미지 너비에 비례
    const dynamicFontSize = (settings.size / 1024) * width;
    // 너무 작아지거나 커지지 않게 클램프 (최소 10px, 최대 이미지 너비의 25%)
    const clampedSize = Math.max(10, Math.min(dynamicFontSize, width * 0.25));

    ctx.fillStyle = `rgba(0, 0, 0, ${settings.opacity / 100})`;
    ctx.font = `bold ${clampedSize}px "Pretendard", sans-serif`;

    if (settings.position === 'pattern') {
      const dynamicSpacing = (settings.spacing / 1024) * width;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.save();
      ctx.translate(width / 2, height / 2);
      ctx.rotate(-Math.PI / 12);
      const textWidth = ctx.measureText(settings.text).width;
      const effectiveSpacingX = Math.max(textWidth, dynamicSpacing * 1.8);
      const effectiveSpacingY = dynamicSpacing;
      for (let y = -height; y < height * 2; y += effectiveSpacingY)
        for (let x = -width; x < width * 2; x += effectiveSpacingX)
          ctx.fillText(settings.text, x, y);
      ctx.restore();
    } else {
      // margin도 이미지 크기에 비례 (최소 8px)
      const margin = Math.max(8, width * 0.025);
      const positions = {
        'top-left':     { x: margin, y: margin, align: 'left', baseline: 'top' },
        'top':          { x: width / 2, y: margin, align: 'center', baseline: 'top' },
        'top-right':    { x: width - margin, y: margin, align: 'right', baseline: 'top' },
        'left':         { x: margin, y: height / 2, align: 'left', baseline: 'middle' },
        'center':       { x: width / 2, y: height / 2, align: 'center', baseline: 'middle' },
        'right':        { x: width - margin, y: height / 2, align: 'right', baseline: 'middle' },
        'bottom-left':  { x: margin, y: height - margin, align: 'left', baseline: 'bottom' },
        'bottom-right': { x: width - margin, y: height - margin, align: 'right', baseline: 'bottom' },
      };
      const pos = positions[settings.position];
      if (pos) {
        ctx.textAlign = pos.align;
        ctx.textBaseline = pos.baseline;
        ctx.fillText(settings.text, pos.x, pos.y);
      }
    }
  }

  // iOS Safari는 <a download>가 신뢰성 있게 동작하지 않아
  // (다운로드 대신 새 탭/공유 시트로 떨어지고, 그 결과물이 합성 전 원본처럼 보이는 경우가 있음).
  // iOS에서는 새 탭으로 이미지를 직접 띄워 "사진에 저장" 흐름을 타게 한다.
  function isIOS() {
    return /iP(hone|od|ad)/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS 13+ 데스크탑 UA 대응
  }

  function triggerDownload(url, filename) {
    if (isIOS()) {
      window.open(url, '_blank');
    } else {
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
    }
  }

  // ── 한 장 처리 (워터마크 합성까지만, 저장은 호출부에서 결정) ──
  function processFile(file) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        drawWatermark(ctx, canvas.width, canvas.height);
        canvas.toBlob(blob => {
          URL.revokeObjectURL(img.src);
          const baseName = file.name.split('.').slice(0, -1).join('.') || file.name;
          const fileName = `cleaned_${baseName}.jpg`;
          const url = URL.createObjectURL(blob);
          totalCount++;
          resolve({ url, fileName });
        }, 'image/jpeg', 0.95);
      };
      img.onerror = () => resolve(null);
      img.src = URL.createObjectURL(file);
    });
  }

  // ── 여러 장 순차 처리 ──
  // iOS + 2장 이상: window.open 연타가 자동 팝업으로 차단되어 마지막 한 장만 저장되는 문제가 있어
  // 전부 처리해두고 토스트에서 한 장씩 사용자가 직접 눌러 저장하게 한다.
  // 그 외(PC/Android, 또는 iOS라도 1장): 처리 즉시 자동 저장.
  async function handleFiles(fileList) {
    const files = Array.from(fileList).filter(f => f && f.type.startsWith('image/'));
    if (!files.length) { alert('이미지 파일만 지원돼.'); return; }

    const useManualSave = isIOS() && files.length > 1;

    uploadBox.classList.add('busy');
    uploadText.textContent = `🫧 세탁 중... (${files.length}장)`;
    toast.classList.remove('show');

    const results = [];
    for (const file of files) {
      const res = await processFile(file);
      if (res) {
        results.push(res);
        if (!useManualSave) triggerDownload(res.url, res.fileName);
      }
    }

    if (results.length) {
      const last = results[results.length - 1];
      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = last.url;
      lastFileName = last.fileName;
      totalCountEl.textContent = totalCount;

      if (useManualSave) {
        renderMultiSaveList(results);
        resaveBtn.style.display = 'none';
      } else {
        singlePreview.style.display = 'flex';
        multiSaveList.classList.remove('show');
        resaveBtn.style.display = '';
        previewImg.src = last.url;
        previewName.textContent = last.fileName + (files.length > 1 ? ` 외 ${files.length - 1}장` : '');
      }
      toast.classList.add('show');
    }

    uploadBox.classList.remove('busy');
    uploadText.textContent = '그림을 넣으면 즉시 세탁';
    fileInput.value = '';
  }

  // iOS 멀티파일 전용: 장별 저장 버튼 목록 렌더링
  function renderMultiSaveList(results) {
    singlePreview.style.display = 'none';
    multiSaveList.innerHTML = '';
    multiSaveList.classList.add('show');

    const hint = document.createElement('div');
    hint.className = 'multi-save-hint';
    hint.textContent = '아이폰은 환경상 한 번에 여러 장 자동 저장 불가(한 장씩 수동 저장 필요)';
    multiSaveList.appendChild(hint);

    results.forEach((res, i) => {
      const row = document.createElement('div');
      row.className = 'multi-save-row';
      row.innerHTML =
        `<img src="${res.url}" alt="">` +
        `<span class="name">${escapeHtml(res.fileName)}</span>` +
        `<button type="button">💾 저장</button>`;
      row.querySelector('button').addEventListener('click', () => {
        triggerDownload(res.url, res.fileName);
        row.classList.add('saved');
        row.querySelector('button').textContent = '✓ 완료';
      });
      multiSaveList.appendChild(row);
    });
  }

  // ── 이벤트 ──
  const prevent = e => { e.preventDefault(); e.stopPropagation(); };
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => uploadBox.addEventListener(e, prevent));
  ['dragenter', 'dragover'].forEach(e => uploadBox.addEventListener(e, () => uploadBox.classList.add('dragover')));
  ['dragleave', 'drop'].forEach(e => uploadBox.addEventListener(e, () => uploadBox.classList.remove('dragover')));
  uploadBox.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
  uploadBox.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  anotherBtn.addEventListener('click', () => { toast.classList.remove('show'); fileInput.click(); });
  resaveBtn.addEventListener('click', () => {
    if (!lastBlobUrl) return;
    triggerDownload(lastBlobUrl, lastFileName);
  });
  toastClose.addEventListener('click', () => toast.classList.remove('show'));

  homeLinkBtn.addEventListener('click', () => { window.location.href = "https://toastout.github.io/wash"; });
  delicateLinkBtn.addEventListener('click', () => { window.location.href = "https://toastout.github.io/toast5s"; });
  fullLinkBtn.addEventListener('click', () => { window.location.href = "https://toastout.github.io/toast5/"; });

  // ── 초기 로드 ──
  if (localStorage.getItem('cleaner_darkmode') === 'true') document.body.classList.add('dark');
  loadSettings();
  renderSummary();
});
</script>
</body>
</html>
